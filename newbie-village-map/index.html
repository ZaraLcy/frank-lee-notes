<style>
  :root{
    --paper:#e9dcbe;            /* 茶染宣紙 */
    --paper-warm:#ecdfc0;
    --paper-edge:#c7b083;
    --ink:#2c2117;             /* 墨 */
    --ink-soft:#5c4a34;
    --line:#7c6242;            /* 赭線 */
    --seal:#a23b2c;            /* 朱印紅 */
    --seal-deep:#7d2a1f;
    --gold:#b6883b;            /* 鎏金 */
    --gold-soft:#d8b15e;
    --jade:#7d9a6f;            /* 青瓷綠 */
    --jade-soft:#b7c8a4;
    --serif:"Noto Serif TC", "Songti TC","STSong",serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--serif);
    background:
      radial-gradient(1200px 600px at 18% 8%, #f4ead0 0%, transparent 60%),
      radial-gradient(1000px 700px at 88% 92%, #e0cfa4 0%, transparent 55%),
      #cdb98e;
    color:var(--ink);
    padding:34px 16px 56px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* ── 標題 ── */
  .map-title-wrap{text-align:center;margin-bottom:22px;}
  .map-title-wrap .eyebrow{
    font-size:13px;letter-spacing:.55em;color:var(--seal);
    font-weight:600;margin:0 0 10px;text-indent:.55em;
  }
  .map-title-wrap h1{
    font-size:clamp(30px,5vw,52px);
    font-weight:900;margin:0;letter-spacing:.22em;text-indent:.22em;
    color:var(--ink);line-height:1;
  }
  .rule{
    width:clamp(180px,40%,340px);height:0;margin:16px auto 12px;
    border:none;border-top:1.5px solid var(--line);position:relative;
  }
  .rule::after{
    content:"❖";position:absolute;left:50%;top:50%;
    transform:translate(-50%,-54%);background:transparent;
    color:var(--seal);font-size:15px;padding:0 12px;
    background:radial-gradient(circle,#e9dcbe 60%,transparent 62%);
  }
  .map-title-wrap .sub{
    margin:0;font-size:clamp(13px,1.7vw,17px);color:var(--ink-soft);
    letter-spacing:.16em;font-weight:500;
  }

  /* ── 地圖外框：宣紙裝裱 ── */
  .map-frame{
    position:relative;border-radius:6px;padding:14px;
    background:linear-gradient(135deg,#d8c499,#cdb98c);
    box-shadow:0 18px 46px rgba(54,34,14,.42), inset 0 0 0 1px rgba(255,250,235,.25);
  }
  .map-frame::before{
    content:"";position:absolute;inset:8px;border:2px solid var(--line);
    border-radius:4px;pointer-events:none;z-index:6;
    box-shadow:inset 0 0 0 4px rgba(214,178,110,.55), inset 0 0 22px rgba(60,38,16,.18);
  }
  svg.map{display:block;width:100%;height:auto;border-radius:3px;position:relative;z-index:1;}
  svg text{font-family:var(--serif);}

  /* ── 節點 ── */
  svg .node{ filter:drop-shadow(0 2px 2.5px rgba(46,30,14,.4)); }
  svg .node-emoji{font-size:18px;text-anchor:middle;}
  svg .node-num{font-size:11px;font-weight:700;fill:#fff8ea;text-anchor:middle;}
  svg .node-label{font-size:12px;font-weight:600;fill:var(--ink);text-anchor:middle;letter-spacing:.02em;}
  svg .node-chip{fill:#fbf2da;stroke:var(--line);stroke-width:1;}
  svg .ring{fill:none;stroke:var(--seal);stroke-width:2.5;opacity:0;}
  svg .hit{fill:transparent;}
  /* 區域配色 */
  svg .r-village .node-main{fill:#fbf2d8;stroke:var(--line);stroke-width:3;}
  svg .r-village .node-badge{fill:var(--seal);}
  svg .r-outpost .node-main{fill:#fbeccb;stroke:#9a7521;stroke-width:3;}
  svg .r-outpost .node-badge{fill:#9a7521;}
  svg .r-swamp   .node-main{fill:#eef4e2;stroke:var(--jade);stroke-width:3;}
  svg .r-swamp   .node-badge{fill:#5f7d50;}
  svg .r-swamp   .node-chip{fill:#eef4e2;stroke:#5f7d50;}
  svg .r-temple  .node-main{fill:#fbf0d4;stroke:var(--gold);stroke-width:3;}
  svg .r-temple  .node-badge{fill:var(--gold);}
  svg .r-temple  .node-chip{fill:#fbf0d4;stroke:var(--gold);}
  /* hover / focus 微互動 */
  svg a.nodelink{cursor:pointer;}
  svg a.nodelink:focus{outline:none;}
  svg a.nodelink:hover .node, svg a.nodelink:focus .node{
    filter:drop-shadow(0 4px 5px rgba(46,30,14,.5)) brightness(1.05);
  }
  svg a.nodelink:hover .ring, svg a.nodelink:focus .ring{ opacity:.92; }
  svg a.nodelink:hover .node-chip, svg a.nodelink:focus .node-chip{ stroke:var(--seal); stroke-width:1.6; }

  .hint{
    text-align:center;margin-top:16px;font-size:13.5px;color:var(--ink-soft);
    letter-spacing:.05em;line-height:1.75;
  }
  .hint b{color:var(--seal);font-weight:700;}

  /* ── 跟隨站點的小方框 ── */
  .callout{
    position:absolute; left:0; top:0; z-index:10; width:232px; max-width:74%;
    background:linear-gradient(180deg,#fbf3dd,#f1e3c2);
    border:1.5px solid var(--line); border-top:4px solid var(--seal);
    border-radius:10px; padding:11px 13px 12px;
    box-shadow:0 9px 24px rgba(54,34,14,.3);
    opacity:0; font-family:var(--serif);
  }
  .callout-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
  .callout-num{
    flex:0 0 auto;height:22px;padding:0 9px;border-radius:11px;
    background:var(--seal);color:#fff3df;font-size:13px;font-weight:900;
    display:inline-flex;align-items:center;
  }
  .callout-num::before{content:"第 ";font-size:10px;font-weight:600;opacity:.85;}
  .callout-num::after{content:" 關";font-size:10px;font-weight:600;opacity:.85;}
  .callout-title{margin:0;font-size:16px;font-weight:900;color:var(--ink);letter-spacing:.03em;}
  .callout-blurb{margin:0 0 9px;font-size:13px;line-height:1.6;color:var(--ink-soft);}
  .callout-read{
    display:inline-block;text-decoration:none;
    background:var(--seal);color:#fff3df;font-weight:700;font-size:13px;
    padding:6px 13px;border-radius:16px;border:1.5px solid var(--seal-deep);
    transition:filter .15s, transform .15s;
  }
  .callout-read:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* ============================================================
 * render.js — 中醫新手村世界地圖渲染引擎（古典水墨版）
 * 輸入 map-data.json 的資料物件，輸出與線上部署版相同
 * 結構的 SVG 字串（class 與部署版一致，互動 JS 直接沿用）。
 * 檢視頁（dist/map.html）與未來的 editor.html 共用這份程式。
 * ============================================================ */

/* ---------- 共用工具 ---------- */

/* 文字顯示寬度（em）：全形字算 1、半形字算 0.55 */
function textEm(s) {
  let w = 0;
  for (const ch of s) w += ch.codePointAt(0) > 0x2e80 ? 1 : 0.55;
  return w;
}

function round1(n) {
  return Math.round(n * 10) / 10;
}

/* Catmull-Rom 轉貝茲曲線：產生依序通過所有關卡的平滑小徑 */
function smoothPath(pts) {
  if (pts.length < 2) return "";
  let d = `M${pts[0].x},${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i - 1, 0)];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[Math.min(i + 2, pts.length - 1)];
    const c1x = round1(p1.x + (p2.x - p0.x) / 6);
    const c1y = round1(p1.y + (p2.y - p0.y) / 6);
    const c2x = round1(p2.x - (p3.x - p1.x) / 6);
    const c2y = round1(p2.y - (p3.y - p1.y) / 6);
    d += ` C${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;
  }
  return d;
}

function regionOf(data, id) {
  return data.regions.find((r) => r.id === id);
}

function nodeOf(data, id) {
  return data.nodes.find((n) => n.id === id);
}

function trailPathOf(data) {
  if (data.trailOverride) return data.trailOverride;
  return smoothPath(data.trail.map((id) => nodeOf(data, id)));
}

        </filter>
        <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="11" result="t"/>
          <feDisplacementMap in="SourceGraphic" in2="t" scale="3"/></filter>
        <filter id="rough-soft"><feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="4" result="t"/>

        <filter id="mist" x="-50%" y="-50%" width="200%" height="200%">

        <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">

        <radialGradient id="vign" cx="50%" cy="48%" r="75%">
          <stop offset="58%" stop-color="#000" stop-opacity="0"/>
          <stop offset="100%" stop-color="#3a2410" stop-opacity="0.34"/>
        </radialGradient>
        <radialGradient id="templeGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#ffe9b0" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="travelerG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c0492f"/><stop offset="100%" stop-color="#7d2a1f"/>
        </linearGradient>
      </defs>`;
}

function renderRegions(data) {
  const shapes = data.regions
    .map((r) => `<path class="region-wash" d="${r.boundary}" fill="${r.fill}"/>`)
    .join("\n        ");
  return `<g filter="url(#rough-soft)" stroke="#9a7d52" stroke-width="1.6" stroke-dasharray="2 7" opacity="0.92">
        ${shapes}
      </g>`;
}

function renderDecorations(data) {
  const big = [];
  const small = [];
  for (const d of data.decorations) {
    switch (d.type) {
      case "mist":
        big.push(`<ellipse cx="${d.x}" cy="${d.y}" rx="${d.rx}" ry="${d.ry}" fill="#f3f6ea" opacity="0.5" filter="url(#mist)"/>`);
        break;
      case "glow":
        big.push(`<ellipse cx="${d.x}" cy="${d.y}" rx="${d.rx}" ry="${d.ry}" fill="url(#templeGlow)"/>`);
        break;
      case "ripple":
        small.push(`<path d="M${d.x},${d.y} q20,-10 40,0 t40,0" stroke="#5d7d63" stroke-width="2" fill="none" opacity="0.7"/>`);
        break;
      case "mountain":
        small.push(`<path d="M${d.x},${d.y} l${d.w},-${d.h} l${d.w},${d.h} z" fill="none" stroke="#8a6b46" stroke-width="2.5"/>`);
        break;
      case "trees":
        small.push(`<g fill="#5e7d4f" opacity="0.8"><circle cx="${d.x}" cy="${d.y}" r="11"/><circle cx="${d.x + 18}" cy="${d.y + 10}" r="9"/></g>`);
        break;
    }
  }
  return `<g class="deco-layer">
        ${big.join("\n        ")}
        <g opacity="0.55" filter="url(#rough-soft)">
          ${small.join("\n          ")}
        </g>
      </g>`;
}

function renderTrail(data) {
  const d = trailPathOf(data);
  return `<g filter="url(#rough)">
        <path id="trail" d="${d}"
          fill="none" stroke="#7a5a3a" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
        <path id="trail-dots" d="${d}"
          fill="none" stroke="#d8b15e" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="1 15" stroke-linejoin="round"/>
      </g>`;
}

function renderRegionLabels(data) {
  return data.regions
    .map((r) => {
      const label = `${r.icon} ${r.name}`;
      const w = Math.round(textEm(label) * 19 + 66);
      return `<g class="region-wash" data-region-label="${r.id}" transform="translate(${r.labelX},${r.labelY})" font-weight="700">
          <rect x="-8" y="-23" width="${w}" height="34" rx="4" fill="${r.labelFill}" opacity="0.84" stroke="${r.labelStroke}" stroke-width="1.4"/>
          <text x="4" y="0" font-size="19" fill="var(--ink)">${label}</text>
        </g>`;
    })
    .join("\n        ");
}

function renderBosses(data) {
  return data.bosses
    .map((b, i) => {
      const size = b.size || 38;
      const half = size / 2;
      const w = Math.max(120, Math.round(textEm(b.name) * 12.5 + 30));
      const py = half + 5;
      return `<g class="boss-flag" data-boss="${i}" transform="translate(${b.x},${b.y})" filter="url(#soft)">
          <rect x="${-half}" y="${-half}" width="${size}" height="${size}" rx="5" transform="rotate(45)" fill="var(--seal)" stroke="var(--seal-deep)" stroke-width="2.5"/>
          <text x="0" y="${size > 40 ? 7 : 6}" font-size="${size > 40 ? 19 : 17}" text-anchor="middle">${b.icon}</text>
          <rect x="${-w / 2}" y="${py}" width="${w}" height="22" rx="4" fill="var(--seal-deep)"/>
          <text x="0" y="${py + 15}" font-size="12.5" text-anchor="middle" fill="#ffe8c2" font-weight="700">${b.name}</text>
        </g>`;
    })
    .join("\n        ");
}

function renderSupplies(data) {
  return data.supplies
    .map((s, i) => {
      const w = Math.round(textEm(s.name) * 11.5 + 42);
      return `<g class="supply" data-supply="${i}" transform="translate(${s.x},${s.y})" filter="url(#soft)">
        <rect x="-15" y="-15" width="30" height="30" rx="6" fill="var(--jade)" stroke="#1c5246" stroke-width="2.5"/>
        <text x="0" y="6" font-size="16" text-anchor="middle">${s.icon}</text>
        <rect x="${-w / 2}" y="18" width="${w}" height="20" rx="4" fill="#1c5246"/>
        <text x="0" y="32" font-size="11.5" text-anchor="middle" fill="#dff5ee" font-weight="700">${s.name}</text>
      </g>`;
    })
    .join("\n      ");
}

function renderNodes(data) {
  return data.nodes
    .map((n) => {
      const region = regionOf(data, n.region);
      const icon = n.icon || region.nodeIcon;
      const badgeR = n.id > 9 ? 12 : 11.5;
      const w = Math.round(textEm(n.title) * 19 + 44);
      const href = n.url || "#";
      return `<a class="nodelink ${region.cls}" href="${href}" target="_blank" rel="noopener" aria-label="第${n.id}關 ${n.title}">
          <g class="node" data-id="${n.id}" transform="translate(${n.x},${n.y})"><circle class="ring" r="28"/><circle class="node-main" r="20"/><text class="node-emoji" y="6">${icon}</text><circle class="node-badge" cx="16" cy="-15" r="${badgeR}"/><text class="node-num" x="16" y="-11">${n.id}</text><rect class="node-chip" x="${-w / 2}" y="25" width="${w}" height="21" rx="6"/><text class="node-label" x="0" y="40">${n.title}</text><circle class="hit" r="34"/></g>
        </a>`;
    })
    .join("\n        ");
}

function renderTraveler() {
  return `<g id="traveler">
        <circle r="11" fill="#fff3df" opacity="0.5"/>
        <circle r="6.5" fill="url(#travelerG)" stroke="#fff3df" stroke-width="2"/>
      </g>`;
}

function renderYouAreHere(data) {
  const cur = nodeOf(data, data.current) || data.nodes[0];
  return `<g id="you-here" transform="translate(${cur.x},${cur.y})">
        <circle r="30" fill="none" stroke="var(--seal)" stroke-width="2.5" opacity="0.7">
          <animate attributeName="r" values="26;40;26" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.75;0;0.75" dur="2.2s" repeatCount="indefinite"/>
        </circle>
        <g transform="translate(0,-54)" filter="url(#soft)">
          <rect x="-1.5" y="0" width="3" height="42" fill="var(--seal-deep)"/>
          <path d="M1.5,2 L46,10 L1.5,20 Z" fill="var(--seal)" stroke="var(--seal-deep)" stroke-width="1.5"/>
          <text x="23" y="15" font-size="11" text-anchor="middle" fill="#fff3df" font-weight="700">你在這裡</text>
        </g>
        <circle r="5" fill="var(--seal)" stroke="#fff3df" stroke-width="2"/>
      </g>`;
}

function renderLegend(data) {
  const x = data.width - 298;
  const y = data.height - 222;
  return `<g class="legend" transform="translate(${x},${y})">
        <rect x="0" y="0" width="284" height="204" rx="8" fill="#fbf3dd" stroke="var(--line)" stroke-width="2.5" opacity="0.97" filter="url(#soft)"/>
        <rect x="6" y="6" width="272" height="192" rx="5" fill="none" stroke="var(--gold)" stroke-width="1" stroke-dasharray="3 4"/>
        <text x="142" y="32" font-size="16" text-anchor="middle" font-weight="700" fill="var(--ink)">圖　例</text>
        <circle cx="30" cy="62" r="13" fill="#fbf2d8" stroke="var(--line)" stroke-width="2.5"/><text x="30" y="67" font-size="12" text-anchor="middle">🏠</text>
        <text x="54" y="66" font-size="13.5" fill="var(--ink)">關卡節點（可點擊看文章）</text>
        <g transform="translate(30,100)"><rect x="-12" y="-12" width="24" height="24" rx="4" transform="rotate(45)" fill="var(--seal)" stroke="var(--seal-deep)" stroke-width="2"/><text y="4" font-size="12" text-anchor="middle">💀</text></g>
        <text x="54" y="104" font-size="13.5" fill="var(--ink)">區域魔王（過關難點）</text>
        <rect x="18" y="126" width="24" height="24" rx="5" fill="var(--jade)" stroke="#1c5246" stroke-width="2"/><text x="30" y="142" font-size="12" text-anchor="middle">⛺</text>
        <text x="54" y="142" font-size="13.5" fill="var(--ink)">補給站（整補與回顧）</text>
        <g transform="translate(30,174)"><circle r="5" fill="var(--seal)" stroke="#fff3df" stroke-width="2"/><path d="M3,-22 L30,-17 L3,-9 Z" fill="var(--seal)" stroke="var(--seal-deep)" stroke-width="1"/><rect x="-2" y="-22" width="2.5" height="22" fill="var(--seal-deep)"/></g>
        <text x="54" y="178" font-size="13.5" fill="var(--ink)">「你在這裡」進度標記</text>
      </g>`;
}

function renderCompass() {
  return `<g class="compass" transform="translate(78,92)" opacity="0.9" filter="url(#soft)">
        <circle r="36" fill="#fbf3dd" stroke="var(--line)" stroke-width="2.5"/>
        <circle r="29" fill="none" stroke="var(--gold)" stroke-width="1" stroke-dasharray="2 3"/>
        <path d="M0,-30 L6,-4 L0,0 L-6,-4 Z" fill="var(--seal)"/>
        <path d="M0,30 L6,4 L0,0 L-6,4 Z" fill="var(--line)"/>
        <path d="M30,0 L4,6 L0,0 L4,-6 Z" fill="var(--ink-soft)" opacity="0.6"/>
        <path d="M-30,0 L-4,6 L0,0 L-4,-6 Z" fill="var(--ink-soft)" opacity="0.6"/>
        <text y="-16" font-size="11" text-anchor="middle" font-weight="700" fill="var(--seal)">北</text>
      </g>`;
}

function renderBrandSeal() {
  return `<g class="brand-seal" transform="translate(82,232)" opacity="0.92">
        <rect x="-38" y="-56" width="76" height="112" rx="6" fill="var(--seal)" stroke="var(--seal-deep)" stroke-width="2.5"/>
        <rect x="-31" y="-49" width="62" height="98" rx="3" fill="none" stroke="#fbeccb" stroke-width="1.4" opacity="0.85"/>
        <g fill="#fbeccb" font-weight="700" font-size="22" text-anchor="middle">
          <text x="13" y="-26">中</text><text x="13" y="2">醫</text><text x="13" y="30">充</text>
          <text x="-13" y="-12">電</text><text x="-13" y="16">站</text>
        </g>
      </g>`;
}

/* ---------- 對外介面 ---------- */

function renderMap(data) {
  const W = data.width;
  const H = data.height;
  return `<svg class="map" viewBox="0 0 ${W} ${H}" role="img"
         aria-label="${data.title} RPG 世界地圖，${data.regions.length} 大區域沿蜿蜒小徑排列，共 ${data.nodes.length} 關節點，每關可點擊前往文章">
      ${renderDefs()}
      <rect x="0" y="0" width="${W}" height="${H}" fill="#e9dcbe"/>
      <rect x="0" y="0" width="${W}" height="${H}" fill="#e9dcbe" filter="url(#paper)" opacity="0.85"/>
      ${renderRegions(data)}
      ${renderDecorations(data)}
      ${renderTrail(data)}
      <g font-weight="700">
        ${renderRegionLabels(data)}
      </g>
      <g>
        ${renderBosses(data)}
      </g>
      ${renderSupplies(data)}
      <g class="nodes">
        ${renderNodes(data)}
      </g>
      ${renderTraveler()}
      ${renderYouAreHere(data)}
      ${renderLegend(data)}
      ${renderCompass()}
      ${renderBrandSeal()}
      <rect x="0" y="0" width="${W}" height="${H}" fill="url(#vign)" pointer-events="none"/>
    </svg>`;
}

/* 跟隨站點的說明小方框（初始內容為目前進度那一關） */
function renderCallout(data) {
  const cur = nodeOf(data, data.current) || data.nodes[0];
  return `<div class="callout" id="callout">
      <div class="callout-head"><span class="callout-num" id="info-num">${cur.id}</span><h3 class="callout-title" id="info-title">${cur.title}</h3></div>
      <p class="callout-blurb" id="info-blurb">${cur.blurb || ""}</p>
      <a class="callout-read" id="info-read" href="${cur.url || "#"}" target="_blank" rel="noopener">📖 讀這篇 →</a>
    </div>`;
}


/* ── 由資料長出頁面 ── */
document.title = MAP_DATA.title + "・世界地圖";
document.getElementById("map-eyebrow").textContent = MAP_DATA.eyebrow;
document.getElementById("map-title").textContent = MAP_DATA.title;
document.getElementById("map-subtitle").textContent = MAP_DATA.subtitle;
document.getElementById("map-frame").innerHTML = renderMap(MAP_DATA) + renderCallout(MAP_DATA);

/* ── 互動與進場動畫（沿用部署版，簡介改讀 MAP_DATA）── */
(function(){
  var KEY='tcm-newbie-progress', DEFAULT=MAP_DATA.current;
  var trail, youHere, steps=[], currentStep=null;

  function blurbFor(n){
    for(var i=0;i<MAP_DATA.nodes.length;i++) if(MAP_DATA.nodes[i].id===n) return MAP_DATA.nodes[i].blurb||'';
    return '';
  }

  function buildSteps(){
    steps = Array.prototype.slice.call(document.querySelectorAll('.nodelink')).map(function(a){
      var g=a.querySelector('.node');
      var m=/translate\(\s*([-\d.]+)[ ,]+([-\d.]+)/.exec((g&&g.getAttribute('transform'))||'');
      var numEl=a.querySelector('.node-num');
      var titleEl=a.querySelector('.node-label');
      return {el:a, x:m?parseFloat(m[1]):0, y:m?parseFloat(m[2]):0,
              href:a.getAttribute('href'), num:numEl?parseInt(numEl.textContent,10):0,
              title:titleEl?titleEl.textContent:''};
    });
  }
  function stepByNum(n){ for(var i=0;i<steps.length;i++) if(steps[i].num===n) return steps[i]; return null; }

  // 把小方框定位到該站點旁（預設站點下方；貼到框底則翻到上方；左右自動內收）
  function placeCallout(s){
    var callout=document.getElementById('callout');
    var frame=document.querySelector('.map-frame');
    if(!callout||!frame||!s) return;
    var node=s.el.querySelector('.node'); if(!node) return;
    var nr=node.getBoundingClientRect(), fr=frame.getBoundingClientRect();
    var cx=nr.left+nr.width/2-fr.left, topY=nr.top-fr.top, botY=nr.bottom-fr.top;
    var cw=callout.offsetWidth, ch=callout.offsetHeight, gap=12;
    var left=cx-cw/2, top=botY+gap;
    if(top+ch > fr.height-6){ top=topY-ch-gap; }      // 下方放不下 → 翻到上方
    if(top<6) top=6;
    if(left<8) left=8;
    var maxLeft=fr.width-cw-8; if(left>maxLeft) left=maxLeft;
    callout.style.left=left+'px'; callout.style.top=top+'px';
  }

  // 移動「你在這裡」朱旗到第 n 關 + 更新小方框；save=true 時寫入 localStorage
  function setProgress(n, save){
    var s=stepByNum(n); if(!s||!youHere) return;
    currentStep=s;
    youHere.setAttribute('transform','translate('+s.x+','+s.y+')');
    var num=document.getElementById('info-num'); if(num) num.textContent=n;
    var tt=document.getElementById('info-title'); if(tt) tt.textContent=s.title;
    var bb=document.getElementById('info-blurb'); if(bb) bb.textContent=blurbFor(n);
    var ir=document.getElementById('info-read'); if(ir) ir.setAttribute('href', s.href);
    placeCallout(s);
    if(save){ try{ localStorage.setItem(KEY, String(n)); }catch(e){} }
  }

  // 互動設定（與 GSAP 無關，無動畫也能用）
  function setup(){
    trail=document.getElementById('trail');
    youHere=document.getElementById('you-here');
    buildSteps();
    var saved=DEFAULT;
    try{ var v=parseInt(localStorage.getItem(KEY),10); if(stepByNum(v)) saved=v; }catch(e){}
    setProgress(saved, false);
    var callout=document.getElementById('callout');
    if(callout && !window.gsap){ callout.style.opacity=1; } // 無動畫時直接顯示
    steps.forEach(function(s){
      s.el.addEventListener('click', function(e){
        e.preventDefault();              // 不導頁，改成移動標記＋方框
        setProgress(s.num, true);
        if(window.gsap){ gsap.fromTo('#callout',{opacity:.45},{opacity:1,duration:.3,ease:'power2.out'}); }
      });
    });
    // 視窗縮放時重新定位方框
    window.addEventListener('resize', function(){ if(currentStep) placeCallout(currentStep); });
    return saved;
  }

  // 進場動畫（GSAP）：路徑描繪 → 節點淡入 → 旅人走到目前進度 → 插旗
  function intro(saved){
    try{
      gsap.registerPlugin(MotionPathPlugin);
      var total=trail.getTotalLength();
      function progressFor(px,py){var best=0,bd=1e12,N=500;for(var i=0;i<=N;i++){var l=total*i/N,p=trail.getPointAtLength(l);var d=(p.x-px)*(p.x-px)+(p.y-py)*(p.y-py);if(d<bd){bd=d;best=l;}}return best/total;}
      var s=stepByNum(saved)||steps[0], hereProg=progressFor(s.x,s.y);

      gsap.set(['.region-wash','.deco-layer','.boss-flag','.supply','.legend','.compass','.brand-seal'],{autoAlpha:0});
      gsap.set('.node',{autoAlpha:0});
      gsap.set(['#trail-dots','#traveler','#you-here','#callout'],{autoAlpha:0});
      gsap.set(trail,{strokeDasharray:total,strokeDashoffset:total});

      gsap.timeline({defaults:{ease:'power2.out'}})
        .to('.region-wash',{autoAlpha:1,duration:.9,stagger:.08},0)
        .to('.deco-layer',{autoAlpha:1,duration:1.0},'<.15')
        .to(trail,{strokeDashoffset:0,duration:2.0,ease:'power1.inOut'},.4)
        .to('#trail-dots',{autoAlpha:1,duration:.8},'-=0.7')
        .to('.node',{autoAlpha:1,duration:.5,stagger:.055},'-=1.95')
        .to('.boss-flag',{autoAlpha:1,duration:.5,stagger:.16},'-=0.7')
        .to('.supply',{autoAlpha:1,duration:.4},'<')
        .set('#traveler',{autoAlpha:1},'-=0.1')
        .to('#traveler',{duration:2.4,ease:'power1.inOut',motionPath:{path:'#trail',align:'#trail',alignOrigin:[.5,.5],start:0,end:hereProg}},'<')
        .to('#traveler',{autoAlpha:0,duration:.4},'-=0.15')
        .to('#you-here',{autoAlpha:1,duration:.55,ease:'back.out(2)'},'-=0.35')
        .to('#callout',{autoAlpha:1,duration:.45},'-=0.2')
        .to(['.legend','.compass','.brand-seal'],{autoAlpha:1,duration:.6,stagger:.12},'-=1.8');
    }catch(e){
      try{ gsap.set(['.region-wash','.deco-layer','.boss-flag','.supply','.legend','.compass','.brand-seal','.node','#trail-dots','#you-here','#callout'],{autoAlpha:1}); if(trail) trail.style.strokeDashoffset=0; }catch(_){}
    }
  }

  window.addEventListener('load', function(){
    var saved=setup();          // 互動永遠啟用
    if(window.gsap) intro(saved); // 有 GSAP 才跑進場動畫
  });
})();
</script>
</body>
</html>
