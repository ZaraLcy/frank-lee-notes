<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t3 d3">
  <title id="t3">心神不安：虛實鑑別與處方思路</title>
  <desc id="d3">心陽虛與水飲擾心的鑑別，及對應處方</desc>
  <rect width="1200" height="760" fill="#fbfaf7"/>
  <rect x="54" y="46" width="1092" height="668" rx="18" fill="#fff" stroke="#d9d2c8" stroke-width="2"/>

  <text x="92" y="108" fill="#25211d" font-size="38" font-weight="800" font-family="Noto Sans TC,PingFang TC,sans-serif">心神不安：虛實鑑別與處方思路</text>
  <text x="92" y="148" fill="#6e665f" font-size="21" font-family="Noto Sans TC,PingFang TC,sans-serif">講者補充：依脈象選方的分流邏輯</text>

  <!-- Root node -->
  <rect x="450" y="178" width="300" height="72" rx="12" fill="#fff7f1" stroke="#a44f31" stroke-width="3"/>
  <text x="600" y="210" fill="#25211d" font-size="26" font-weight="800" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">心神不安</text>
  <text x="600" y="238" fill="#6e665f" font-size="18" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">心慌、易驚、坐臥不安</text>

  <!-- Branch lines -->
  <line x1="520" y1="250" x2="285" y2="322" stroke="#a44f31" stroke-width="2" stroke-dasharray="7,4"/>
  <line x1="600" y1="250" x2="600" y2="322" stroke="#6e665f" stroke-width="2" stroke-dasharray="7,4"/>
  <line x1="680" y1="250" x2="915" y2="322" stroke="#2f756f" stroke-width="2" stroke-dasharray="7,4"/>

  <!-- Left: 虛 -->
  <rect x="80" y="322" width="400" height="68" rx="10" fill="#fff7f1" stroke="#a44f31" stroke-width="2"/>
  <text x="280" y="352" fill="#a44f31" font-size="22" font-weight="800" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">虛｜心陽虛弱</text>
  <text x="280" y="378" fill="#6e665f" font-size="16" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">寸部無力，忽冷忽熱，自汗，脈浮取五粒</text>

  <!-- Center: 補坎益離丹 -->
  <rect x="468" y="322" width="264" height="68" rx="10" fill="#f1ede6" stroke="#d9d2c8" stroke-width="2"/>
  <text x="600" y="352" fill="#25211d" font-size="21" font-weight="800" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">補坎益離丹</text>
  <text x="600" y="378" fill="#6e665f" font-size="16" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">溫補心腎｜水藥長期服</text>

  <!-- Right: 實 -->
  <rect x="716" y="322" width="400" height="68" rx="10" fill="#eef8f5" stroke="#2f756f" stroke-width="2"/>
  <text x="916" y="352" fill="#2f756f" font-size="22" font-weight="800" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">實｜水飲擾心</text>
  <text x="916" y="378" fill="#6e665f" font-size="16" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">左關浮微如棉，水氣上凌心</text>

  <!-- Left formula cards -->
  <rect x="80" y="420" width="184" height="148" rx="10" fill="#fff7f1" stroke="#d9d2c8" stroke-width="1.5"/>
  <text x="172" y="450" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">桂枝甘草湯</text>
  <text x="172" y="474" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">辛甘化陽基礎方</text>
  <text x="172" y="496" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">心下悸、脈無力</text>

  <rect x="278" y="420" width="202" height="148" rx="10" fill="#fff7f1" stroke="#d9d2c8" stroke-width="1.5"/>
  <text x="379" y="444" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">桂枝甘草</text>
  <text x="379" y="466" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">龍骨牡蠣湯</text>
  <text x="379" y="492" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">加重鎮安神</text>
  <text x="379" y="514" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">神不守舍、煩躁</text>

  <!-- Center formula: 白通湯 -->
  <rect x="494" y="420" width="212" height="148" rx="10" fill="#f1ede6" stroke="#d9d2c8" stroke-width="1.5"/>
  <text x="600" y="452" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">白通湯</text>
  <text x="600" y="476" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">尺部浮空微</text>
  <text x="600" y="498" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">心慌、心疑</text>
  <text x="600" y="520" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">陽虛較深</text>

  <!-- Right formula cards -->
  <rect x="718" y="420" width="192" height="148" rx="10" fill="#eef8f5" stroke="#d9d2c8" stroke-width="1.5"/>
  <text x="814" y="450" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">苓桂朮甘湯</text>
  <text x="814" y="474" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">溫化水飲</text>
  <text x="814" y="496" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">水氣凌心</text>

  <rect x="924" y="420" width="192" height="148" rx="10" fill="#eef8f5" stroke="#d9d2c8" stroke-width="1.5"/>
  <text x="1020" y="450" fill="#25211d" font-size="18" font-weight="700" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">茯苓四逆湯</text>
  <text x="1020" y="474" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">陽虛水飲</text>
  <text x="1020" y="496" fill="#6e665f" font-size="15" text-anchor="middle" font-family="Noto Sans TC,PingFang TC,sans-serif">虛實並存</text>

  <!-- Bottom note -->
  <rect x="80" y="596" width="1040" height="90" rx="12" fill="#f1ede6"/>
  <text x="116" y="632" fill="#25211d" font-size="23" font-weight="700" font-family="Noto Sans TC,PingFang TC,sans-serif">關鍵鑑別</text>
  <text x="116" y="668" fill="#6e665f" font-size="20" font-family="Noto Sans TC,PingFang TC,sans-serif">左寸浮取力道強弱 → 判斷心陽虛程度；左關浮微如棉 → 水飲擾心；兩者同時存在時可合方。</text>
</svg>
