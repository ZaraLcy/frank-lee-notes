<meta charset="UTF-8">
<meta content="text/html; charset=utf-8" http-equiv="Content-Type">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

{%- if page.title -%}
<title>{{ page.title | escape }} · {{ site.title | escape }}</title>
{%- else -%}
<title>{{ site.title | escape }}</title>
{%- endif -%}

<meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
<meta name="generator" content="Jekyll">
{%- if site.author -%}
<meta name="author" content="{{ site.author | escape }}">
{%- endif -%}

<meta property="og:type" content="{% if page.layout == 'post' or page.layout == 'micro-post' or page.layout == 'thread' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
{%- if site.og_image -%}
<meta property="og:image" content="{{ site.url }}{{ site.og_image }}">
{%- endif -%}

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta property="twitter:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
{%- if site.og_image -%}
<meta property="twitter:image" content="{{ site.url }}{{ site.og_image }}">
{%- endif -%}

<link rel="stylesheet" href="{{site.baseurl}}/assets/gitbook/rouge/{{ site.syntax_highlighter_style | default: 'colorful' }}.css">
<link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="shortcut icon" href="{{ site.baseurl }}/{{ site.favicon_path }}" type="image/x-icon">
